# KEDA ScaledObjects Configuration for Microservices Demo
# ---------------------------------------------------------
# This file defines the dynamic autoscaling rules for all microservices.
# It uses Prometheus triggers to monitor CPU usage across the cluster.
# 
# Key Configurations:
# - Target CPU Utilization is set to 70% (represented as threshold 0.15 based on CPU requests).
# - Maximum replicas vary based on service criticality and load test results:
#   * shippingservice: Max 10 (High load during checkout spikes)
#   * frontend: Max 7 (High traffic entry point)
#   * other services: Max 5
# ---------------------------------------------------------
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: adservice-prom-cpu
  namespace: default
spec:
  scaleTargetRef:
    name: adservice
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
        query: |
          sum(rate(container_cpu_usage_seconds_total{namespace="default",pod=~".*adservice.*"}[2m]))
        threshold: "0.15"
---
